<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css?v=1.4}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: frg-admin-sidebar}"></div>

    <div class="content">
        <div class="admin-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <div>
                <h2>Employee Management</h2>
                <p>Manage your academy's workforce, instructors, and support staff</p>
            </div>
        </div>
        
        <section class="mt-4">
            <a href="addEmployee" class="btn btn-primary">
                <i class="bi bi-person-plus-fill me-2"></i> Add Employee
            </a>
        </section>

        <section class="mt-5">
            <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm" th:text="${successMsg}"></div>
            <div th:if="${errorMsg}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMsg}"></div>
            
            <div th:if="${#lists.isEmpty(employeePage.content)}" class="alert alert-light border py-4 text-center text-muted">
                No employees found in the system.
            </div>
            
            <div th:if="${!#lists.isEmpty(employeePage.content)}" class="table-responsive shadow-sm rounded-3">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone No.</th>
                            <th>City</th>
                            <th class="text-center">Update</th>
                            <th class="text-center">Delete</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employee : ${employeePage.content}">
                            <td class="table-name" th:text="${employee.name}"></td>
                            <td th:text="${employee.email}"></td>
                            <td th:text="${employee.phoneno}"></td>
                            <td th:text="${employee.city}"></td>
                            <td class="text-center">
                                <a th:href="@{/editEmployee(employeeEmail=${employee.email})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil-fill text-white"></i>
                                </a>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-danger" th:data-eemail="${employee.email}" onclick="deleteEmployee(this.getAttribute('data-eemail'))">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav class="mt-4" th:if="${!#lists.isEmpty(employeePage.content)}" aria-label="Page navigation">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${employeePage.hasPrevious()} ? '' : 'disabled'">
                        <a class="page-link" th:href="@{/employeeManagement(page=${employeePage.number-1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, employeePage.totalPages-1)}" th:classappend="${employeePage.number==i} ? 'active' : ''">
                        <a class="page-link" th:href="@{/employeeManagement(page=${i})}" th:text="${i+1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${employeePage.hasNext()} ? '' : 'disabled'">
                        <a class="page-link" th:href="@{/employeeManagement(page=${employeePage.number+1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </section>
    </div>
    
    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Confirm Deletion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                    <p class="mt-3 fs-5">Are you sure you want to delete this employee?</p>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger px-4" id="deleteEmployeeBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var empEmailToDelete;
        function deleteEmployee(employeeEmail) {
            var deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            deleteModal.show();
            empEmailToDelete = employeeEmail;
        }
        document.getElementById('deleteEmployeeBtn').addEventListener('click', function(){
            window.location.href = '/deleteEmployeeDetails?employeeEmail='+encodeURIComponent(empEmailToDelete);
        });
    </script>
</body>
</html>
