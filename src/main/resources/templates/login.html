<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VK Academy | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css?v=14.0}">
    <style>
        #google-msg {
            display: none;
            background: linear-gradient(135deg, #e8f0fe, #d2e3fc);
            border-left: 4px solid #4285f4;
            color: #1a73e8;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>

    <!-- header starts -->
    <div th:replace="~{fragments/header :: crm-header}"></div>
    <!-- header ends -->

    <!-- main content starts -->
    <main class="container-fluid p-0" style="min-height: 550px;">

        <!-- content -->
        <section class="container-fluid px-3 px-md-5 py-5">
            <h3 class="text-center mb-4"> Login Here </h3>

            <!-- courses -->
            <div class="row justify-content-center">
                <!-- login card start -->
                <div class="col-lg-4 col-md-6">
                    <form action="loginForm" method="post">
                        <div class="card shadow p-4 p-md-5">
                                                <div th:if="${errorMsg}" class="mb-3 alert alert-danger" role="alert">

                            <span th:text="${errorMsg}"></span>
							</div>
                            <div class="mb-3">
                                <label class="form-label">Email Id :</label>
                                <input type="email" class="form-control" name="email" />
                                <div id="emailHelp" class="form-text">
                                    We'll never share your email with anyone else.
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password : </label>
                                <input type="password" class="form-control" name="password" />
                            </div>
                            <div class="mb-3 text-end">
                                <a href="forgotPassword" class="text-decoration-none small text-primary fw-semibold">Forgot Password?</a>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>

                            <div class="d-flex align-items-center mb-3">
                                <hr class="flex-grow-1 m-0">
                                <span class="mx-3 text-muted small fw-bold">OR</span>
                                <hr class="flex-grow-1 m-0">
                            </div>

                            <div id="google-msg">
                                <i class="bi bi-info-circle-fill me-2"></i>Google Sign-In is coming soon. Please use your email and password.
                            </div>

                            <a href="#" class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center" onclick="document.getElementById('google-msg').style.display='block'; return false;">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 18px; height: 18px; margin-right: 10px;">
                                <span class="fw-semibold">Continue with Google</span>
                            </a>
                            
                            <div class="mt-4 pt-3 border-top text-center">
                                <a href="adminLogin" class="text-secondary text-decoration-none small">
                                    <i class="bi bi-person-lock me-1"></i> Login as Admin
                                </a>
                            </div>
                            <div class="mt-2 text-center">
                                <span class="text-muted small">Don't have an account? </span>
                                <a href="/register" class="text-primary text-decoration-none small fw-semibold">Register here</a>
                            </div>
                        </div>
                    </form>
                </div>
                <!-- login card ends -->

            </div>
        </section>
    </main>
    <!-- main content ends -->

    <!-- footer starts -->
    <div th:replace="~{fragments/footer :: crm-footer}"></div>
    <!-- footer ends -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
