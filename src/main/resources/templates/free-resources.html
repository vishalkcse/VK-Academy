<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Free Resources | VK Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css?v=22.0}">
</head>

<body>

    <!-- header starts -->
    <div th:if="${sessionUser == null OR sessionUser == ''}">
        <div th:replace="~{fragments/header :: crm-header}"></div>
    </div>
    <div th:unless="${sessionUser == null OR sessionUser == ''}">
        <div th:replace="~{fragments/user-header :: u-header}"></div>
    </div>
    <!-- header ends -->

    <main class="container py-5" style="min-height: 70vh;">

        <div class="row g-4 justify-content-center">
            <div th:each="resource : ${resources}" class="col-md-6 col-lg-4 reveal">
                <div class="card h-100 shadow-sm border-0 resource-card">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary-subtle text-primary rounded-pill px-3 py-1 small fw-bold"
                                th:text="${resource.category}">
                                CATEGORY
                            </div>
                        </div>
                        <h4 class="fw-bold mb-3" th:text="${resource.title}">Resource Title</h4>
                        <p class="text-muted mb-4" th:text="${resource.description}">Resource Description goes here.</p>
                        <a th:href="${resource.resourceLink}" download class="btn btn-primary w-100 fw-bold py-2">
                            <i class="bi bi-download me-2"></i> Access Resource
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${resources == null OR resources.isEmpty()}" class="text-center py-3 reveal">
                <h2 class="fw-bold">Resources are being prepared!</h2>
                <p class="text-muted mx-auto" style="max-width: 500px;">
                    Our team is currently curating high-quality learning materials, PDFs, and roadmap guides for you.
                    Please check back soon for some amazing free content!
                </p>
                <div class="mt-4">
                    <a href="/index" class="btn btn-outline-primary px-4 py-2 fw-bold">Back to Home</a>
                </div>
            </div>
        </div>
    </main>

    <!-- footer starts -->
    <div th:replace="~{fragments/footer :: crm-footer}"></div>
    <!-- footer ends -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* Scroll Reveal Logic */
        document.addEventListener('DOMContentLoaded', () => {
            const observerOptions = { threshold: 0.1 };
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
        });
    </script>
</body>

</html>
