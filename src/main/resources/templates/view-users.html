<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registered Users | VK Academy Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css?v=1.1}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: frg-admin-sidebar}"></div>

    <div class="content">
        <div class="admin-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <div>
                <h2>Registered Users</h2>
                <p class="text-muted">All students who have registered on VK Academy</p>
            </div>
        </div>

        <section class="mt-4">
            
            <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm" th:text="${successMsg}"></div>
            <div th:if="${errorMsg}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMsg}"></div>

            <div th:if="${#lists.isEmpty(usersList)}" class="alert alert-light border shadow-sm py-4 text-center text-muted">
                <i class="bi bi-people fs-1 d-block mb-2"></i>
                No registered users found.
            </div>

            <div th:if="${!#lists.isEmpty(usersList)}" class="table-responsive shadow-sm rounded-3">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone No.</th>
                            <th>City</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u, stat : ${usersList}">
                            <td th:text="${stat.count}"></td>
                            <td>
                                <i class="bi bi-person-circle text-primary me-2"></i>
                                <span th:text="${u.name}"></span>
                            </td>
                            <td th:text="${u.email}"></td>
                            <td>
                                <a th:href="'tel:' + ${u.phoneno}" class="text-decoration-none fw-semibold text-success">
                                    <i class="bi bi-telephone-fill me-1"></i>
                                    <span th:text="${u.phoneno}"></span>
                                </a>
                            </td>
                            <td th:text="${u.city}"></td>
                            <td class="text-center">
                                <a th:href="@{/deleteUser(id=${u.id})}" class="btn btn-sm btn-outline-danger" 
                                   title="Delete User" onclick="return confirm('Are you sure you want to permanently delete this user?')">
                                    <i class="bi bi-trash3"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <p class="text-muted small mt-3">
                <i class="bi bi-info-circle me-1"></i>
                Total registered users: <strong th:text="${#lists.size(usersList)}"></strong>
            </p>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
