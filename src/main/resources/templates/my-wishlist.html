<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Wishlist</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" th:href="@{/css/theme.css?v=14.0}">

</head>

<body>

	<!-- header starts -->
	<div th:replace="~{fragments/user-header :: u-header}"></div>
	<!-- header ends -->

	<!-- main content starts -->
	<main class="container-fluid p-0" style="min-height: 550px;">
		<section class="container-fluid px-md-5 py-5">
			<h3 class="text-center mb-4">My Wishlist</h3>
			
			<div th:if="${#lists.isEmpty(wishlistCourses)}" class="text-center">
				<h4 class="text-muted"> Your wishlist is empty. </h4>
				<a th:href="@{/index}" class="btn btn-primary mt-3">Browse Courses</a>
			</div>

			<!-- courses div start -->
			<div class="row g-4">

				<!-- one course card start -->
				<div th:each="course : ${wishlistCourses}" class="col-lg-3 col-md-6">
					<div class="card h-100 shadow-sm border-0">
						<img th:src="@{${course.imageUrl}}" class="card-img-top" alt="...">
						<div class="card-body">
							<h5 class="card-title">
								<span th:text="${course.name}"></span>
								<a th:href="@{/removeFromWishlist(courseId=${course.id})}" class="float-end text-danger" title="Remove from Wishlist">
									<i class="bi bi-heart-fill"></i>
								</a>
							</h5>
							<p class="card-text small">
								<span th:text="${course.description}"></span>
							</p>
							<div class="d-flex justify-content-between align-items-center">
								<div>
									<span class="original-price-text">Rs. <span th:text="${course.originalPrice}"></span></span>
									<span class="price-text">Rs. <span th:text="${course.discountedPrice}"></span></span>
								</div>
								<a th:href="@{/index}" class="btn btn-sm btn-primary">Buy Now</a>
							</div>
						</div>
					</div>
				</div>
				<!-- one course card ends -->

			</div>

		</section>
	</main>
	<!-- main content ends -->

	<!-- footer starts -->
	<div th:replace="~{fragments/footer :: crm-footer}"></div>
	<!-- footer ends -->

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>

</html>
