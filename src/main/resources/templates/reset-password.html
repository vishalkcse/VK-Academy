<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/theme.css?v=5.0}">
</head>

<body>

    <!-- header starts -->
    <div th:replace="~{fragments/header :: crm-header}"></div>
    <!-- header ends -->

    <!-- main content starts -->
    <main class="container-fluid" style="min-height: 550px;">

        <section class="container py-5 bg-light">
            <h3 class="text-center mb-4"> Reset Your Password </h3>

            <div class="row justify-content-center">
                <div class="col-lg-4 col-md-6">
                    <form action="resetPasswordForm" method="post">
                        <div class="card shadow p-5">
                        	<div th:if="${errorMsg}" class="mb-3 alert alert-danger" role="alert">
								<span th:text="${errorMsg}"></span>
							</div>
                            
                            <input type="hidden" name="email" th:value="${email}" />

                            <div class="mb-3">
                                <label class="form-label">Enter OTP :</label>
                                <input type="text" class="form-control" name="otp" required />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Enter New Password :</label>
                                <input type="password" class="form-control" name="newPassword" required />
                            </div>
                            <button type="submit" class="btn btn-success">Update Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- footer starts -->
    <div th:replace="~{fragments/footer :: crm-footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
