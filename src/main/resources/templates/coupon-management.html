<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offer Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css?v=1.4}">
</head>
<body>
    <div th:replace="~{fragments/admin-sidebar :: frg-admin-sidebar}"></div>

    <div class="content">
        <div class="admin-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <div>
                <h2>Offer Management</h2>
                <p>Manage active student discount offers and promotional coupons to drive academy growth</p>
            </div>
        </div>

        <section class="mt-4">
            <div class="stat-card p-4">
                <h5 class="mb-4 fw-medium text-muted small text-uppercase">Add New Coupon</h5>
                <form th:action="@{/addCoupon}" method="post" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small fw-medium">Coupon Code</label>
                        <input type="text" name="code" class="form-control" placeholder="e.g. VK10" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label small fw-medium">Discount (%)</label>
                        <input type="number" name="discount" class="form-control" placeholder="e.g. 10" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-plus-lg me-2"></i> Add Offer
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section class="mt-5">
            <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm mb-4" th:text="${successMsg}"></div>
            
            <div class="table-responsive shadow-sm rounded-3">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Coupon Code</th>
                            <th>Discount Value</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="coupon : ${coupons}">
                            <td class="ps-4 table-name text-primary" th:text="${coupon.code}"></td>
                            <td th:text="${coupon.discountPercentage + '% OFF'}"></td>
                            <td class="text-center">
                                <a th:href="@{/deleteCoupon(id=${coupon.id})}" class="btn btn-sm btn-outline-danger border-0">
                                    <i class="bi bi-trash3-fill"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(coupons)}">
                            <td colspan="3" class="text-center py-5 text-muted">No active coupons found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
