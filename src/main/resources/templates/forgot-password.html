<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css?v=5.0}">
</head>

<body>

    <!-- header starts -->
    <div th:replace="~{fragments/header :: crm-header}"></div>
    <!-- header ends -->

    <!-- main content starts -->
    <main class="container-fluid" style="min-height: 550px;">

        <section class="container py-5 bg-light">
            <h3 class="text-center mb-4"> Forgot Password </h3>

            <div class="row justify-content-center">
                <div class="col-lg-4 col-md-6">
                    <form action="forgotPasswordForm" method="post">
                        <div class="card shadow p-5">
                        	<div th:if="${errorMsg}" class="mb-3 alert alert-danger" role="alert">
								<span th:text="${errorMsg}"></span>
							</div>
							<div th:if="${successMsg}" class="mb-3 alert alert-success" role="alert">
								<span th:text="${successMsg}"></span>
							</div>
                            <div class="mb-3">
                                <label class="form-label">Enter Registered Email Id :</label>
                                <input type="email" class="form-control" name="email" required />
                            </div>
                            <button type="submit" class="btn btn-primary">Send Reset Link</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- footer starts -->
    <div th:replace="~{fragments/footer :: crm-footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
