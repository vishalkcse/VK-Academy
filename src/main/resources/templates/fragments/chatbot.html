<!-- Floating Chat Bot UI starts -->
<div th:fragment="chatbot">
    <style>
        :root {
            --chat-primary: #4f46e5;
            --chat-bg: rgba(255, 255, 255, 0.95);
            --chat-glass: rgba(255, 255, 255, 0.8);
        }

        #ai-chat-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #ai-chat-bubble:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.5);
        }

        #ai-chat-window {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 380px;
            height: 550px;
            max-height: 80vh;
            background: var(--chat-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            display: none;
            flex-direction: column;
            z-index: 9999;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .chat-header {
            padding: 20px;
            background: linear-gradient(90deg, #4f46e5, #6366f1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-status {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #10b981;
        }

        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-ai {
            background: white;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
        }

        .msg-user {
            background: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2);
        }

        .chat-footer {
            padding: 20px;
            background: white;
            border-top: 1px solid #f3f4f6;
        }

        .input-wrapper {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 30px;
            padding: 0 8px 0 0;
            display: flex;
            align-items: center;
            transition: all 0.3s;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: white;
        }

        #user-msg {
            border: none !important;
            background: transparent !important;
            padding: 12px 20px;
            width: 100%;
            outline: none !important;
            font-size: 0.95rem;
            border-radius: 30px;
            appearance: none;
            -webkit-appearance: none;
            box-shadow: none !important;
        }

        #send-ai-msg {
            background: #4f46e5;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        #send-ai-msg:hover {
            background: #4338ca;
            transform: scale(1.1);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Dark Mode Support for Chatbot */
        [data-bs-theme="dark"] #ai-chat-window {
            background: #111827 !important; /* Deep Navy/Slate */
            border-color: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6) !important;
        }

        [data-bs-theme="dark"] .msg-ai {
            background: #1f2937 !important;
            color: #f3f4f6 !important;
            border-color: #374151 !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2) !important;
        }

        [data-bs-theme="dark"] .chat-footer {
            background: #111827 !important;
            border-top: 1px solid #374151 !important;
        }

        [data-bs-theme="dark"] .input-wrapper {
            background: #1f2937 !important;
            border-color: #374151 !important;
        }

        [data-bs-theme="dark"] #user-msg {
            color: #ffffff !important;
        }

        [data-bs-theme="dark"] .typing-dots .dot {
            background: #6b7280 !important;
        }

        /* Responsive Chatbot for Mobile */
        @media (max-width: 576px) {
            #ai-chat-window {
                right: 15px !important;
                bottom: 85px !important;
                width: calc(100% - 30px) !important;
                height: 50vh !important;
                max-height: 450px !important;
                border-radius: 18px !important;
            }
            #ai-chat-bubble {
                right: 20px !important;
                bottom: 20px !important;
                width: 55px !important;
                height: 55px !important;
            }
            .chat-header {
                padding: 15px !important;
            }
            .msg {
                max-width: 90% !important;
                font-size: 0.9rem !important;
            }
        }

    </style>

    <!-- Chat Bubble -->
    <div id="ai-chat-bubble">
        <i class="bi bi-robot" style="font-size: 2rem;"></i>
    </div>

    <!-- Chat Window -->
    <div id="ai-chat-window">
        <div class="chat-header">
            <div>
                <h6 class="mb-0 fw-bold"><i class="bi bi-lightning-charge-fill me-1"></i> VK Academy</h6>
                <small class="opacity-75"><span class="chat-status"></span>Online | AI Assistant</small>
            </div>
            <button type="button" class="btn-close btn-close-white" id="close-chat" style="font-size: 0.8rem;"></button>
        </div>

        <div id="chat-messages">
            <div class="msg msg-ai shadow-sm">
                Hello! I'm your VK Academy Assistant. How can I guide your learning journey today?
            </div>
        </div>

        <div class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="user-msg" placeholder="Ask about courses, pricing..." autocomplete="off">
                <button id="send-ai-msg"><i class="bi bi-send-fill"></i></button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const bubble = document.getElementById('ai-chat-bubble');
            const windowEl = document.getElementById('ai-chat-window');
            const closeBtn = document.getElementById('close-chat');
            const sendBtn = document.getElementById('send-ai-msg');
            const input = document.getElementById('user-msg');
            const messages = document.getElementById('chat-messages');

            bubble.onclick = (e) => {
                e.stopPropagation();
                windowEl.style.display = windowEl.style.display === 'flex' ? 'none' : 'flex';
            };

            closeBtn.onclick = () => windowEl.style.display = 'none';

            /* 
             * addMessage handles the UI updates for both user and AI messages. 
             * It ensures the chat auto-scrolls to keep the latest conversation visible.
             */
            const addMessage = (text, isUser) => {
                const div = document.createElement('div');
                div.className = `msg ${isUser ? 'msg-user' : 'msg-ai shadow-sm'}`;
                div.textContent = text;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            };

            const sendMessage = () => {
                const text = input.value.trim();
                if (!text) return;

                addMessage(text, true);
                input.value = '';
                
                /* 
                 * We show a typing animation while waiting for the AI response 
                 * to provide visual feedback to the student.
                 */
                // Premium Typing Animation
                const loading = document.createElement('div');
                loading.className = 'msg msg-ai shadow-sm';
                loading.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
                messages.appendChild(loading);
                messages.scrollTop = messages.scrollHeight;

                fetch('/api/chat/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                })
                    .then(res => res.json())
                    .then(data => {
                        messages.removeChild(loading);
                        addMessage(data.response, false);
                    })
                    .catch(() => {
                        if (messages.contains(loading)) messages.removeChild(loading);
                        addMessage("Elite connection interrupted. Please try again.", false);
                    });
            };

            sendBtn.onclick = sendMessage;
            input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        })();
    </script>
</div>
<!-- Floating Chat Bot UI ends -->
