<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us | VK Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css?v=5.0}">
    <style>
        .contact-info-card {
            border: none;
            border-radius: 15px;
            background: #f8f9fa;
            padding: 30px;
            height: auto; /* Fixed expansion issue */
        }
        .icon-box {
            width: 50px;
            height: 50px;
            background: #4f46e5;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body class="bg-light">
    <div th:if="${sessionUser == null OR sessionUser == ''}">
    	<div th:replace="~{fragments/header :: crm-header}"></div>
    </div>
    <div th:unless="${sessionUser == null OR sessionUser == ''}">
    	<div th:replace="~{fragments/user-header :: u-header}"></div>
    </div>

    <main class="container py-5 my-5 bg-white shadow-sm rounded-4">
        <div class="row">
            <div class="col-lg-5">
                <h2 class="fw-bold mb-4">Get in Touch</h2>
                <p class="text-muted mb-5">Have questions about our courses or need help with your learning journey? Our team is here to help you 24/7.</p>
                
                <div class="contact-info-card mb-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="icon-box me-3">
                            <i class="bi bi-geo-alt-fill"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold">Our Location</h6>
                            <p class="text-muted small mb-0">123 Tech Park, Sector 5, New Delhi, India</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-center mb-3">
                        <div class="icon-box me-3">
                            <i class="bi bi-envelope-fill"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold">Email Us</h6>
                            <p class="text-muted small mb-0">support@vkacademy.com</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="icon-box me-3">
                            <i class="bi bi-telephone-fill"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold">Call Us</h6>
                            <p class="text-muted small mb-0">+91 98765 43210</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-7">
                <div class="card border-0 p-4">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control px-3 py-2" placeholder="John Doe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control px-3 py-2" placeholder="john@example.com">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-control px-3 py-2" placeholder="How can we help?">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Message</label>
                                <textarea class="form-control px-3 py-2" rows="5" placeholder="Your message..."></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary px-5 py-2 mt-3 shadow-sm">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: crm-footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
